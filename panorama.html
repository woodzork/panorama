<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Panorama</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: white;
}

.frame {
  width: 100%;
  height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: grab;
  user-select: none;
}

.track {
  position: absolute;
  top: 0;
  left: 0;
  will-change: transform;
}

.track img {
  height: 400px;
  width: auto;
  display: block;
  pointer-events: none;
  transform-origin: top left;
}

/* ── Hotspot (rectangle matching photo footprint) ── */
.hotspot {
  position: absolute;
  z-index: 20;
  cursor: pointer;
}

.hotspot-area {
  width: 100%;
  height: 100%;
  border: 2px solid rgba(255, 255, 255, 0);
  background: rgba(255, 255, 255, 0);
  border-radius: 4px;
  box-shadow: 0 0 0 rgba(0,0,0,0);
  transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.hotspot:hover .hotspot-area,
.hotspot.active .hotspot-area {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.85);
  box-shadow: 0 0 16px rgba(255,255,255,0.35), inset 0 0 16px rgba(255,255,255,0.15);
}

.hotspot-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  background: rgba(255,255,255,0.97);
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 10px 13px;
  width: 200px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease;
  transform-origin: center center;
  transform: translate(-50%, -50%) scale(0.85);
}

.hotspot.active .hotspot-popup {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}

.popup-title {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  font-weight: 700;
  color: #222;
  margin-bottom: 5px;
  line-height: 1.3;
}

.popup-desc {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  color: #555;
  line-height: 1.45;
}
#start-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 1000;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12vh;
  cursor: pointer;
  transition: opacity 0.5s ease;
}

#start-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

#start-overlay-text {
  font-family: Arial, sans-serif;
  font-size: 20px;
  font-weight: 400;
  color: #fff;
  text-align: center;
  line-height: 1.6;
  padding: 20px 30px;
  max-width: 80%;
}

</style>
</head>
<body>

<div id="start-overlay">
  <div id="start-overlay-text">
    This is an interactive timeline of my projects.<br>Pan forward or back by dragging the mouse or using a finger.<br>Zoom by clicking the mouse or pressing with your finger on an area of interest.<br>Each project was completed while employed by the firm shown in the section footing.<br><br>Click anywhere to start.
  </div>
</div>

<div class="frame" id="frame">
  <div class="track" id="track">
    <img src="https://woodzork.github.io/panorama/panorama.jpg" id="img" alt="Panorama">
  </div>
</div>

<audio id="bg-audio" src="https://woodzork.github.io/panorama/Night%20Drive.mp3" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════
//  HOTSPOT DATA — paste your exported JSON here
// ═══════════════════════════════════════════════
const HOTSPOT_DATA = [
  {
    "x": 800,
    "y": 700,
    "w": 200,
    "h": 180,
    "title": "Chattanooga Riverfront Development",
    "desc": "4th and 5th year urban design studio"
  },
  {
    "x": 1400,
    "y": 850,
    "w": 200,
    "h": 180,
    "title": "Rammed Earth Works",
    "desc": "I spent two years working with an early pioneer of rammed earth construction"
  }
];
// ═══════════════════════════════════════════════

const track = document.getElementById("track");
const img   = document.getElementById("img");
const frame = document.getElementById("frame");

let x = 0, y = 0;
const speed    = 0.40;
const endPause = 6000;
const fadeTime = 2000;

let cyclePaused = true;
let zoomed      = false;
const zoomFactor = 2;

let preZoomX = 0, preZoomY = 0;
let audioStarted = false;
const bgAudio = document.getElementById('bg-audio');
const startOverlay = document.getElementById('start-overlay');

startOverlay.addEventListener('click', startExperience, { once: true });
startOverlay.addEventListener('touchend', (e) => {
  e.preventDefault();
  startExperience();
}, { once: true });

function startExperience() {
  if (!audioStarted) {
    audioStarted = true;
    bgAudio.play().catch(() => {});
  }
  startOverlay.classList.add('hidden');
  setTimeout(() => startOverlay.remove(), 500);
  cyclePaused = false;
}

let dragging = false;
let moved    = false;
let startX = 0, startY = 0;
let startPositionX = 0, startPositionY = 0;
let activeHotspot = null;

// ── Scale factor: editor stores full image pixels,
//    viewer displays image at 400px tall ──
function getScale() {
  // img.naturalHeight is the real pixel height of the image
  // img.offsetHeight is the displayed height (400px)
  return img.offsetHeight / img.naturalHeight;
}

// ── Build hotspot elements, scaling coords to display size ──
function buildHotspots() {
  HOTSPOT_DATA.forEach((hs) => {
    const el = document.createElement('div');
    el.className = 'hotspot';
    el.dataset.x = hs.x;
    el.dataset.y = hs.y;
    el.dataset.w = hs.w;
    el.dataset.h = hs.h;

    el.innerHTML = `
      <div class="hotspot-area"></div>
      <div class="hotspot-popup">
        <div class="popup-title">${hs.title}</div>
        <div class="popup-desc">${hs.desc}</div>
      </div>
    `;

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (moved) return;
      if (!audioStarted) {
        audioStarted = true;
        bgAudio.play().catch(() => {});
      }
      if (activeHotspot && activeHotspot !== el) {
        activeHotspot.classList.remove('active');
      }
      el.classList.toggle('active');
      activeHotspot = el.classList.contains('active') ? el : null;
      syncPopupScale();
    });

    el.addEventListener('touchend', (e) => {
      e.stopPropagation();
      e.preventDefault();
      if (moved) return;
      if (!audioStarted) {
        audioStarted = true;
        bgAudio.play().catch(() => {});
      }
      if (activeHotspot && activeHotspot !== el) {
        activeHotspot.classList.remove('active');
      }
      el.classList.toggle('active');
      activeHotspot = el.classList.contains('active') ? el : null;
      syncPopupScale();
    });

    track.appendChild(el);
  });

  positionHotspots();
}

// ── Position (or reposition) all hotspots based on current zoom state ──
function positionHotspots() {
  const baseScale = getScale();
  const zoomMult  = zoomed ? zoomFactor : 1;
  const totalScale = baseScale * zoomMult;

  document.querySelectorAll('.hotspot').forEach(el => {
    const hx = parseFloat(el.dataset.x);
    const hy = parseFloat(el.dataset.y);
    const hw = parseFloat(el.dataset.w);
    const hh = parseFloat(el.dataset.h);

    el.style.left   = (hx * totalScale) + 'px';
    el.style.top    = (hy * totalScale) + 'px';
    el.style.width  = (hw * totalScale) + 'px';
    el.style.height = (hh * totalScale) + 'px';
  });
}

function syncPopupScale() {
  const popups = document.querySelectorAll('.hotspot-popup');
  // zoomed: scale up for a bigger, easier-to-read popup
  // unzoomed: normal size
  const s = zoomed ? 0.85 : 1;
  popups.forEach(p => {
    p.style.transform = `translate(-50%, -50%) scale(${s})`;
  });
}

function closeAllPopups() {
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  activeHotspot = null;
}

// ── Click to zoom ──
frame.addEventListener("click", (e) => {
  if (moved) { moved = false; return; }
  closeAllPopups();

  if (!audioStarted) {
    audioStarted = true;
    bgAudio.play().catch(() => {});
  }

  const rect   = frame.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  zoomed = !zoomed;

  if (zoomed) {
    // remember exactly where we were before zooming in
    preZoomX = x;
    preZoomY = y;

    img.style.transform = `scale(${zoomFactor})`;
    x = (x + clickX) * zoomFactor - frame.offsetWidth  / 2;
    y = (y + clickY) * zoomFactor - frame.offsetHeight / 2;
    const maxX = img.offsetWidth  * zoomFactor - frame.offsetWidth;
    const maxY = img.offsetHeight * zoomFactor - frame.offsetHeight;
    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));
  } else {
    img.style.transform = "scale(1)";
    // return to exactly where we were before zooming in
    x = preZoomX;
    y = preZoomY;
    x = Math.max(0, Math.min(x, img.offsetWidth - frame.offsetWidth));
  }

  track.style.transform = `translate(${-x}px, ${-y}px)`;
  positionHotspots();
  syncPopupScale();
});

// ── Mouse drag ──
frame.addEventListener("mousedown", (e) => {
  dragging = true;
  moved    = false;
  startX   = e.clientX;
  startY   = e.clientY;
  startPositionX = x;
  startPositionY = y;
  frame.style.cursor = "grabbing";
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  moved = true;
  const currentWidth  = zoomed ? img.offsetWidth  * zoomFactor : img.offsetWidth;
  const currentHeight = zoomed ? img.offsetHeight * zoomFactor : img.offsetHeight;
  x = Math.max(0, Math.min(startPositionX - (e.clientX - startX), currentWidth  - frame.offsetWidth));
  y = Math.max(0, Math.min(startPositionY - (e.clientY - startY), currentHeight - frame.offsetHeight));
  track.style.transform = `translate(${-x}px, ${-y}px)`;
});

window.addEventListener("mouseup", () => {
  dragging = false;
  frame.style.cursor = "grab";
});

// ── Touch drag ──
frame.addEventListener("touchstart", (e) => {
  if (e.touches.length !== 1) return;
  dragging = true;
  moved    = false;
  startX   = e.touches[0].clientX;
  startY   = e.touches[0].clientY;
  startPositionX = x;
  startPositionY = y;
  e.preventDefault();
}, { passive: false });

frame.addEventListener("touchmove", (e) => {
  if (!dragging || e.touches.length !== 1) return;
  moved = true;
  const currentWidth  = zoomed ? img.offsetWidth  * zoomFactor : img.offsetWidth;
  const currentHeight = zoomed ? img.offsetHeight * zoomFactor : img.offsetHeight;
  x = Math.max(0, Math.min(startPositionX - (e.touches[0].clientX - startX), currentWidth  - frame.offsetWidth));
  y = Math.max(0, Math.min(startPositionY - (e.touches[0].clientY - startY), currentHeight - frame.offsetHeight));
  track.style.transform = `translate(${-x}px, ${-y}px)`;
  e.preventDefault();
}, { passive: false });

frame.addEventListener("touchend", (e) => {
  dragging = false;
  if (!moved) {
    closeAllPopups();

    if (!audioStarted) {
      audioStarted = true;
      bgAudio.play().catch(() => {});
    }

    const touch  = e.changedTouches[0];
    const rect   = frame.getBoundingClientRect();
    const clickX = touch.clientX - rect.left;
    const clickY = touch.clientY - rect.top;
    zoomed = !zoomed;
    if (zoomed) {
      preZoomX = x;
      preZoomY = y;

      img.style.transform = `scale(${zoomFactor})`;
      x = (x + clickX) * zoomFactor - frame.offsetWidth  / 2;
      y = (y + clickY) * zoomFactor - frame.offsetHeight / 2;
      const maxX = img.offsetWidth  * zoomFactor - frame.offsetWidth;
      const maxY = img.offsetHeight * zoomFactor - frame.offsetHeight;
      x = Math.max(0, Math.min(x, maxX));
      y = Math.max(0, Math.min(y, maxY));
    } else {
      img.style.transform = "scale(1)";
      x = preZoomX;
      y = preZoomY;
      x = Math.max(0, Math.min(x, img.offsetWidth - frame.offsetWidth));
    }
    track.style.transform = `translate(${-x}px, ${-y}px)`;
    positionHotspots();
    syncPopupScale();
  }
  moved = false;
});

// ── Auto-scroll ──
function animate() {
  const currentWidth = zoomed ? img.offsetWidth * zoomFactor : img.offsetWidth;
  const maxScroll    = currentWidth - frame.offsetWidth;
  if (!zoomed && !dragging && !cyclePaused && maxScroll > 0) {
    x += speed;
    if (x >= maxScroll) {
      cyclePaused = true;
      setTimeout(() => {
        track.style.opacity = "0";
        setTimeout(() => {
          x = 0; y = 0;
          track.style.transform = "translate(0px,0px)";
          track.style.opacity   = "1";
          cyclePaused = false;
        }, fadeTime);
      }, endPause);
    }
    track.style.transform = `translate(${-x}px, 0px)`;
  }
  requestAnimationFrame(animate);
}

img.onload = () => { buildHotspots(); animate(); };
if (img.complete) { buildHotspots(); animate(); }
</script>
</body>
</html>
